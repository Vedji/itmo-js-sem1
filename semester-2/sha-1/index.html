<html>
<head></head>
<body>
  <input type="text" id="inp">
  <button id="bt">Вычислить SHA-1</button>
  <h4>ponkratov_na</h4>
  <script>
    function rotl(n, s) { 
      return (n << s) | (n >>> (32 - s)); 
    }
    function hex(n) {
    return ('0000000' + n.toString(16)).slice(-8);
    }

    function sha1(str) {
      var bytes = [];
      for (var i = 0; i < str.length; i++) {
        var c = str.charCodeAt(i);
        if (c < 128) {
          bytes.push(c);
        } else if (c < 2048) {
          bytes.push(192 | (c >> 6), 128 | (c & 63));
        } else {
          bytes.push(224 | (c >> 12), 128 | ((c >> 6) & 63), 128 | (c & 63));
        }
      }

      var msgLen = bytes.length;
      bytes.push(0x80);
      while (bytes.length % 64 !== 56) { 
        bytes.push(0); 
      }

      var bitLen = msgLen * 8;
      bytes.push(0, 0, 0, 0);
      bytes.push((bitLen >>> 24) & 0xff, (bitLen >>> 16) & 0xff, (bitLen >>> 8) & 0xff, bitLen & 0xff);

      var h0 = 0x67452301, h1 = 0xEFCDAB89, h2 = 0x98BADCFE, h3 = 0x10325476, h4 = 0xC3D2E1F0;

      for (var chunk = 0; chunk < bytes.length; chunk += 64) {
        var w = [];
        for (var j = 0; j < 16; j++) {
          w[j] = (bytes[chunk + j*4] << 24) | (bytes[chunk + j*4+1] << 16) | (bytes[chunk + j*4+2] << 8)  |  bytes[chunk + j*4+3];
      }
      for (var j = 16; j < 80; j++) {
        w[j] = rotl(w[j-3] ^ w[j-8] ^ w[j-14] ^ w[j-16], 1);
      }

      var a = h0, b = h1, c = h2, d = h3, e = h4;

      for (var j = 0; j < 80; j++) {
        var f, k;
        if (j < 20) { 
          f = (b & c) | (~b & d); k = 0x5A827999; 
        }else if (j < 40)  { 
          f = b ^ c ^ d;           k = 0x6ED9EBA1; 
        } else if (j < 60) { 
          f = (b & c) | (b & d) | (c & d); k = 0x8F1BBCDC; 
        } else {
          f = b ^ c ^ d;
          k = 0xCA62C1D6; 
        }

        var temp = (rotl(a, 5) + f + e + k + w[j]) >>> 0;
        e = d; d = c; c = rotl(b, 30); b = a; a = temp;
      }

    h0 = (h0 + a) >>> 0; h1 = (h1 + b) >>> 0; h2 = (h2 + c) >>> 0;
    h3 = (h3 + d) >>> 0; h4 = (h4 + e) >>> 0;
    }
    return hex(h0) + hex(h1) + hex(h2) + hex(h3) + hex(h4);
  }

  document.getElementById('bt').addEventListener('click', function() {
  var input = document.getElementById('inp');
  input.value = sha1(input.value);
  });
  </script>
  </body>
</html>
