<html>
<head></head>
<body>
  <h4>ponkratov_na</h4>
  <script>
    (function() {
      var raw = location.search;
      if (raw.length < 2) { 
        document.title = "noup;("; return; 
      }

      var pairs = raw.slice(1).split("&");
      var params = {};
      for (var i = 0; i < pairs.length; i++) {
        var idx = pairs[i].indexOf("=");
        var key = pairs[i].slice(0, idx);
        var val = pairs[i].slice(idx + 1);
        params[key] = val;
      }

      var vecA = params["A"].split(",").map(Number);
      var vecB = params["B"].split(",").map(Number);
      var bias = Number(params["C"]);

      var dot = 0;
      for (var j = 0; j < vecA.length; j++) {
        dot += vecA[j] * vecB[j];
      }
      var z = dot + bias;

      var sigma = 1 / (1 + Math.exp(-z));

      var result;
      if (sigma >= 1) {
        result = "1";
      } else {
        var str = String(sigma);
        var dotPos = str.indexOf(".");
        if (dotPos === -1) {
          result = "1";
        } else {
          var truncated = str.slice(0, dotPos + 4);
          result = truncated;
        }
      }

      document.title = result;
    }) ();
  </script>
</body>
</html>
